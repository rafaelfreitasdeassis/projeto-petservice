<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agendamento Petshop</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f4f7ff, #dfefff);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #ffffff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .titulo {
      text-align: center;
      margin-bottom: 30px;
    }

    .titulo h2 {
      color: #2b2b2b;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .titulo p {
      color: #666;
      font-size: 15px;
    }

    .grupo {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 12px;
      font-size: 15px;
      transition: 0.3s;
      background: #fafafa;
    }

    input:focus,
    select:focus {
      border-color: #4a90e2;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #357abd;
      transform: translateY(-2px);
    }

    @media (max-width: 500px) {
      .container {
        padding: 25px;
      }

      .titulo h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="titulo">
      <h2>🐶 Agendamento Petshop</h2>
      <p>Banho, tosa e cuidados especiais para seu pet</p>
    </div>

    <form>

      <div class="grupo">
        <label for="cliente">Seu nome</label>
        <input type="text" id="cliente" name="cliente" placeholder="Digite seu nome" required>
      </div>

      <div class="grupo">
        <label for="pet">Nome do pet</label>
        <input type="text" id="pet" name="pet" placeholder="Digite o nome do pet" required>
      </div>

      <div class="grupo">
        <label for="servico">Tipo de serviço</label>
        <select id="servico" name="servico" required>
          <option value="">Selecione um serviço</option>
          <option value="banho_tosa">Banho e Tosa</option>
          <option value="tosa_higienica">Tosa Higiênica</option>
          <option value="tosa_completa">Tosa Completa</option>
        </select>
      </div>

      <div class="grupo">
        <label for="data">Escolha a data</label>
        <input type="date" id="data" name="data" required>
      </div>

      <div class="grupo">
        <label for="hora">Escolha o horário</label>
        <input type="time" id="hora" name="hora" required>
      </div>

      <button type="submit">
        Agendar Horário
      </button>

    </form>

  </div>

</body>

</html>
