<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pet Service</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f4f7ff, #dfefff);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      padding: 40px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .logo {
      font-size: 55px;
      margin-bottom: 10px;
    }

    h1 {
      color: #2b2b2b;
      font-size: 38px;
      margin-bottom: 10px;
    }

    .subtitulo {
      color: #666;
      font-size: 18px;
      margin-bottom: 35px;
    }

    #menu-principal {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #menu-principal li a {
      display: block;
      text-decoration: none;
      background: #4a90e2;
      color: white;
      padding: 16px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      transition: 0.3s;
    }

    #menu-principal li a:hover {
      background: #357abd;
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(53, 122, 189, 0.25);
    }

    .rodape {
      margin-top: 30px;
      color: #999;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 25px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitulo {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">🐾</div>

    <h1>Pet Service</h1>

    <p class="subtitulo">
      Bem-vindo ao sistema de agendamento do petshop
    </p>

    <ul id="menu-principal">
      <li>
        <a href="index.html">🏠 Home</a>
      </li>

      <li>
        <a href="cadastro.html">👤 Usuários</a>
      </li>

      <li>
        <a href="agenda.html">📅 Agendamento</a>
      </li>

      <li>
        <a href="tabela.html">📋 Tabela</a>
      </li>
    </ul>

    <div class="rodape">
      © 2026 Pet Service • Sistema moderno para petshops
    </div>

  </div>

</body>

</html>
